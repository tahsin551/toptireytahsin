<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product — TopTire</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Work+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body data-page="shop">

<header>
  <div class="tread-strip thin"></div>
  <nav class="wrap">
    <a href="index.html" class="logo"><span class="dot"></span>TOPTIRE</a>
    <button class="navtoggle" id="navToggle" aria-label="Toggle menu">☰</button>
    <div class="navlinks" id="navLinks">
      <a href="index.html" data-nav="home">Home</a>
      <a href="shop.html" data-nav="shop">Shop</a>
      <a href="about.html" data-nav="about">About</a>
      <a href="contact.html" data-nav="contact">Contact</a>
      <a href="cart.html" class="cart-btn" data-nav="cart">Cart <span class="cart-count" id="cartCount">0</span></a>
    </div>
  </nav>
</header>

<section class="block">
  <div class="wrap">
    <div class="pd-wrap" id="pdWrap"></div>
  </div>
</section>

<footer>
  <div class="wrap">
    <div class="footer-grid">
      <div>
        <h4 class="logo" style="color:var(--paper);">TOPTIRE</h4>
        <p style="max-width:260px;">Heavyweight streetwear, built to grip. Based in Chattogram, delivered across Bangladesh.</p>
      </div>
      <div>
        <h4>SHOP</h4>
        <a href="shop.html">All Products</a>
        <a href="cart.html">Cart</a>
      </div>
      <div>
        <h4>COMPANY</h4>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </div>
      <div>
        <h4>PAYMENT</h4>
        <p>Cash on Delivery</p>
        <p>bKash · Nagad · Rocket</p>
      </div>
    </div>
    <div class="footer-bottom">
      <span>© 2026 TopTire. All rights reserved.</span>
      <span>Made in Chattogram.</span>
    </div>
  </div>
</footer>

<div class="toast" id="toast"></div>

<script src="products.js"></script>
<script src="js/cart.js"></script>
<script src="js/common.js"></script>
<script>
  const params = new URLSearchParams(location.search);
  const currentProductId = params.get('id');
  let selectedSize = null;
  let selectedQty = 1;

  function pdSwatchHTML(p){
    if(p.image){
      return `<div class="pd-swatch"><img src="${p.image}" alt="${p.name}"></div>`;
    }
    return `<div class="pd-swatch"><div class="glyph">${p.glyph.split('|').join('<br>')}</div></div>`;
  }

  function renderProduct(){
    const p = findProduct(currentProductId);
    if(!p){
      document.getElementById('pdWrap').innerHTML = `<p>Product not found. <a href="shop.html" style="text-decoration:underline;">Back to shop</a></p>`;
      return;
    }
    if(!selectedSize) selectedSize = p.sizes[0];
    document.title = p.name + ' — TopTire';
    document.getElementById('pdWrap').innerHTML = `
      ${pdSwatchHTML(p)}
      <div class="pd-info">
        <span class="section-tag">${p.category.toUpperCase()} // ${p.id.toUpperCase()}</span>
        <h1>${p.name}</h1>
        <div class="pd-price mono">${money(p.price)}</div>
        <p class="pd-desc">${p.desc}</p>

        <span class="field-label">Size</span>
        <div class="size-row" id="sizeRow">
          ${p.sizes.map(s => `<button class="size-opt ${s===selectedSize?'selected':''}" onclick="selectSize('${s}')">${s}</button>`).join('')}
        </div>

        <span class="field-label">Quantity</span>
        <div class="qty-row">
          <button class="qty-btn" onclick="changeQty(-1)">–</button>
          <span class="qty-val" id="qtyVal">${selectedQty}</span>
          <button class="qty-btn" onclick="changeQty(1)">+</button>
        </div>

        <button class="btn btn-primary btn-block" onclick="addCurrentToCart()">Add to Cart — ${money(p.price*selectedQty)}</button>

        <div class="spec-list">
          ${Object.entries(p.spec).map(([k,v])=>`<div class="spec-row"><span>${k}</span><span>${v}</span></div>`).join('')}
        </div>
      </div>
    `;
  }
  function selectSize(s){ selectedSize = s; renderProduct(); }
  function changeQty(d){ selectedQty = Math.max(1, selectedQty + d); renderProduct(); }
  function addCurrentToCart(){
    const p = findProduct(currentProductId);
    addToCart(p, selectedSize, selectedQty);
    showToast(`${p.name} (${selectedSize}) x${selectedQty} added to cart`);
  }

  renderProduct();
</script>
</body>
</html>
